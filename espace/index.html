<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Espace client · Présens</title>
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#0F1F18">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2">
  <link rel="stylesheet" href="/espace/espace.css">

  <!-- Navbar style « hero » (scopée à cette page, sans toucher espace.css partagé) -->
  <style>
    #navbar { gap: 28px; }

    .nav-logo { cursor: pointer; }

    .nav-links { display: flex; align-items: center; gap: 28px; }

    /* Surcharge locale du .nav-link pour le look « hero » (menu) */
    #navbar .nav-links .nav-link {
      font-family: var(--font-ui);
      font-size: 13px;
      font-weight: 400;
      color: var(--text-secondary);
      transition: color 200ms ease;
    }
    #navbar .nav-links .nav-link:hover { color: var(--text-primary); }

    .nav-cta {
      display: inline-flex; align-items: center;
      padding: 6px 14px;
      background: var(--green-cta);
      border-radius: var(--radius-pill);
      font-family: var(--font-ui);
      font-size: 11px; font-weight: 500;
      text-transform: uppercase; letter-spacing: var(--ls-pill);
      color: var(--text-primary); text-decoration: none;
      transition: background-color 200ms ease, transform 200ms ease;
    }
    .nav-cta:hover { background: var(--bg-hover); transform: translateY(-1px); }

    /* ── Menu mobile ── */
    .nav-menu-btn {
      display: none; align-items: center; justify-content: center;
      width: 32px; height: 32px;
      background: transparent;
      border: 1px solid var(--green-forest); border-radius: var(--radius-md);
      cursor: pointer; color: var(--text-secondary); flex-shrink: 0;
      transition: border-color 200ms, color 200ms;
    }
    .nav-menu-btn:hover { border-color: var(--green-sage); color: var(--text-primary); }
    .nav-menu-btn .icon-close { display: none; }
    .nav-menu-btn.open .icon-menu { display: none; }
    .nav-menu-btn.open .icon-close { display: block; }

    .nav-dropdown {
      position: absolute; top: calc(100% + 10px); right: 0;
      display: flex; flex-direction: column; gap: 2px; padding: 8px;
      background: rgba(20, 40, 34, 0.95);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--green-forest); border-radius: var(--radius-md);
      min-width: 160px;
      opacity: 0; pointer-events: none; transform: translateY(-6px);
      transition: opacity 200ms ease, transform 200ms ease;
    }
    .nav-dropdown.open { opacity: 1; pointer-events: auto; transform: translateY(0); }
    .nav-dropdown-item {
      font-family: var(--font-body); font-size: 14px; font-weight: 300;
      color: var(--text-secondary); background: transparent;
      border: none; border-radius: 8px; padding: 10px 14px;
      text-align: left; text-decoration: none; display: block;
      transition: background 180ms, color 180ms;
    }
    .nav-dropdown-item:hover { background: var(--bg-hover); color: var(--text-primary); }

    @media (min-width: 1024px) {
      #navbar { padding: 14px 32px; gap: 36px; }
      .nav-links { gap: 36px; }
      #navbar .nav-links .nav-link { font-size: 14px; font-weight: 500; }
      .nav-logo { font-size: 22px; }
    }

    @media (max-width: 768px) {
      #navbar { gap: 16px; }
      .nav-links .nav-link { display: none; }
      .nav-menu-btn { display: flex; }
    }
  </style>
</head>

<body>
  <div class="orb" style="width:520px;height:520px;background:radial-gradient(circle,rgba(45,107,82,0.5),transparent 70%);top:-120px;left:50%;transform:translateX(-50%);filter:blur(115px);"></div>
  <div class="orb" style="width:320px;height:320px;background:radial-gradient(circle,rgba(155,234,200,0.34),transparent 70%);bottom:10%;right:-60px;filter:blur(90px);"></div>

  <nav id="navbar" role="navigation" aria-label="Navigation principale">
    <a class="nav-logo" href="/" aria-label="Présens — accueil"><span class="pre">Pré</span><span class="sens">sens</span></a>
    <div class="nav-links">
      <a class="nav-link" href="/#section-2">Méthode</a>
      <a class="nav-link" href="/#section-4">Tarifs</a>
      <a class="nav-link" href="/#section-3">Le fondateur</a>
      <a class="nav-link" href="/#section-5">FAQ</a>
      <a class="nav-link" href="/blog">Blog</a>
      <a class="nav-cta" href="/cdn-cgi/access/logout">DÉCONNEXION →</a>
    </div>
    <button class="nav-menu-btn" id="nav-menu-btn" aria-label="Menu" aria-expanded="false">
      <svg class="icon-menu" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
        stroke-width="1.5" stroke-linecap="round" aria-hidden="true">
        <line x1="3" y1="6" x2="21" y2="6" />
        <line x1="3" y1="12" x2="21" y2="12" />
        <line x1="3" y1="18" x2="21" y2="18" />
      </svg>
      <svg class="icon-close" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
        stroke-width="1.5" stroke-linecap="round" aria-hidden="true">
        <line x1="18" y1="6" x2="6" y2="18" />
        <line x1="6" y1="6" x2="18" y2="18" />
      </svg>
    </button>
    <div class="nav-dropdown" id="nav-dropdown" role="menu">
      <a class="nav-dropdown-item" href="/#section-2" role="menuitem">Méthode</a>
      <a class="nav-dropdown-item" href="/#section-4" role="menuitem">Tarifs</a>
      <a class="nav-dropdown-item" href="/#section-3" role="menuitem">Le fondateur</a>
      <a class="nav-dropdown-item" href="/#section-5" role="menuitem">FAQ</a>
      <a class="nav-dropdown-item" href="/blog" role="menuitem">Blog</a>
      <a class="nav-dropdown-item" href="/cdn-cgi/access/logout" role="menuitem">Déconnexion</a>
    </div>
  </nav>

  <main id="app">
    <div class="page-head">
      <span class="pill">ESPACE CLIENT</span>
      <h1 id="title">Chargement…</h1>
    </div>
    <p class="msg err" id="error"></p>
    <div id="content"></div>
  </main>

  <script>
    /* ── Menu mobile (dropdown navbar) ── */
    (function () {
      var btn = document.getElementById('nav-menu-btn');
      var dd = document.getElementById('nav-dropdown');
      if (!btn || !dd) return;
      function close() { btn.classList.remove('open'); dd.classList.remove('open'); btn.setAttribute('aria-expanded', 'false'); }
      btn.addEventListener('click', function (e) {
        e.stopPropagation();
        var open = dd.classList.toggle('open');
        btn.classList.toggle('open', open);
        btn.setAttribute('aria-expanded', open ? 'true' : 'false');
      });
      document.addEventListener('click', function (e) { if (!dd.contains(e.target) && e.target !== btn) close(); });
      document.addEventListener('keydown', function (e) { if (e.key === 'Escape') close(); });
    })();
  </script>

  <script>
    (function () {
      var content = document.getElementById('content');
      var title = document.getElementById('title');
      var errEl = document.getElementById('error');

      function showError(m) { errEl.textContent = m; errEl.classList.add('show'); title.textContent = 'Espace client'; }
      function fmtDate(d) { if (!d) return '—'; try { return new Date(d + 'T00:00:00Z').toLocaleDateString('fr-FR', { day: '2-digit', month: 'long', year: 'numeric' }); } catch (e) { return d; } }
      function fmtMoney(n) { return (n == null) ? '—' : Number(n).toLocaleString('fr-FR') + ' € / mois'; }
      function esc(s) { return String(s == null ? '' : s).replace(/[&<>"]/g, function (c) { return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]; }); }
      var STATUT_LABEL = { actif: 'Actif', resiliation_planifiee: 'Résiliation planifiée', resilie: 'Résilié' };

      fetch('/espace/api/me', { headers: { 'Accept': 'application/json' } })
        .then(function (r) { return r.json().then(function (d) { return { ok: r.ok, d: d }; }); })
        .then(function (res) {
          if (!res.ok) { showError(res.d.error || 'Accès refusé.'); return; }
          var me = res.d;

          if (me.role === 'admin') {
            title.textContent = 'Administration';
            content.innerHTML =
              '<div class="card"><p class="note">Vous êtes connecté en tant qu\'administrateur.</p>' +
              '<a class="btn-cta" href="/espace/admin/">Ouvrir l\'espace admin →</a></div>';
            return;
          }

          title.innerHTML = 'Bonjour, <em>' + esc(me.etablissement) + '.</em>';
          var statutClass = me.statut || 'actif';
          var statutTxt = STATUT_LABEL[me.statut] || me.statut;

          var html =
            '<div class="card">' +
            '<div style="display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;">' +
            '<h2 style="margin:0;">Votre abonnement</h2>' +
            '<span class="badge ' + esc(statutClass) + '">' + esc(statutTxt) + '</span>' +
            '</div>' +
            '<div class="info-grid">' +
            '<div class="info-item"><span class="info-label">Formule</span><span class="info-value">' + esc(me.formule || '—') + '</span></div>' +
            '<div class="info-item"><span class="info-label">Montant</span><span class="info-value">' + esc(fmtMoney(me.montant_mensuel)) + '</span></div>' +
            '<div class="info-item"><span class="info-label">Début d\'abonnement</span><span class="info-value">' + esc(fmtDate(me.date_debut)) + '</span></div>' +
            '<div class="info-item"><span class="info-label">Fin d\'engagement</span><span class="info-value">' + esc(fmtDate(me.fin_engagement)) + '</span></div>' +
            '</div>';

          if (me.statut === 'resiliation_planifiee') {
            html += '<p class="note">Résiliation planifiée. Votre abonnement reste actif et facturé jusqu\'au <span class="highlight">' + esc(fmtDate(me.date_effet_si_resiliation)) + '</span>.</p>';
          } else if (me.statut === 'actif') {
            html += '<div style="margin-top:4px;"><a class="btn-danger" href="/espace/resiliation/">Se désabonner →</a></div>';
          }
          html += '</div>';

          // Documents
          html += '<div class="card"><h2>Vos documents</h2><div class="doc-list" id="docs"><p class="empty">Chargement…</p></div></div>';
          content.innerHTML = html;

          fetch('/espace/api/documents', { headers: { 'Accept': 'application/json' } })
            .then(function (r) { return r.json().then(function (d) { return { ok: r.ok, d: d }; }); })
            .then(function (dr) {
              var box = document.getElementById('docs');
              if (!dr.ok) { box.innerHTML = '<p class="empty">Impossible de charger les documents.</p>'; return; }
              var docs = dr.d.documents || [];
              if (!docs.length) { box.innerHTML = '<p class="empty">Aucun document pour le moment.</p>'; return; }
              box.innerHTML = docs.map(function (doc) {
                return '<a class="doc-row" href="/espace/api/document?id=' + encodeURIComponent(doc.id) + '">' +
                  '<span class="doc-main"><span class="doc-type">' + esc(doc.type) + '</span>' +
                  '<span class="doc-name">' + esc(doc.filename) + '</span></span>' +
                  '<span class="doc-meta">' + esc(doc.periode || fmtDate((doc.uploaded_at || '').slice(0, 10))) + ' ↓</span></a>';
              }).join('');
            });
        })
        .catch(function () { showError('Connexion impossible.'); });
    })();
  </script>
</body>
</html>
