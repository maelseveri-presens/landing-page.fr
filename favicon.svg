<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- Sphère : dégradé radial, lumière en haut à gauche -->
    <radialGradient id="sphere" cx="38%" cy="32%" r="75%">
      <stop offset="0%" stop-color="#3E8467"/>
      <stop offset="45%" stop-color="#2C6A51"/>
      <stop offset="100%" stop-color="#0E2C20"/>
    </radialGradient>
    <!-- Halo doux autour du P -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="0.7" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <circle cx="32" cy="32" r="32" fill="url(#sphere)"/>

  <!-- P serif clair -->
  <text x="32" y="33" text-anchor="middle" dominant-baseline="central"
        font-family="Georgia, 'Times New Roman', serif" font-weight="700"
        font-size="46" fill="#F0F5F2" filter="url(#glow)">P</text>
</svg>
